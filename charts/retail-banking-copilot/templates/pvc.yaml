{{- if .Values.persistence.data.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "retail-banking-copilot.fullname" . }}-data
  labels:
    {{- include "retail-banking-copilot.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.data.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.data.size }}
  {{- if .Values.persistence.data.storageClassName }}
  storageClassName: {{ .Values.persistence.data.storageClassName | quote }}
  {{- end }}
---
{{- end }}
{{- if and .Values.persistence.chroma.enabled (eq .Values.chroma.mode "persistent") }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "retail-banking-copilot.fullname" . }}-chroma
  labels:
    {{- include "retail-banking-copilot.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml .Values.persistence.chroma.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.persistence.chroma.size }}
  {{- if .Values.persistence.chroma.storageClassName }}
  storageClassName: {{ .Values.persistence.chroma.storageClassName | quote }}
  {{- end }}
{{- end }}
