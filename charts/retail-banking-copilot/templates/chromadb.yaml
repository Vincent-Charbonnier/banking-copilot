{{- if .Values.chromadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "retail-banking-copilot.chromadbFullname" . }}
  labels:
    {{- include "retail-banking-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  type: {{ .Values.chromadb.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "retail-banking-copilot.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: chromadb
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.chromadb.service.port }}
      targetPort: http
---
{{- if .Values.chromadb.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "retail-banking-copilot.chromadbFullname" . }}
  labels:
    {{- include "retail-banking-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  accessModes:
    {{- toYaml .Values.chromadb.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.chromadb.persistence.size }}
  {{- if .Values.chromadb.persistence.storageClassName }}
  storageClassName: {{ .Values.chromadb.persistence.storageClassName | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "retail-banking-copilot.chromadbFullname" . }}
  labels:
    {{- include "retail-banking-copilot.labels" . | nindent 4 }}
    app.kubernetes.io/component: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "retail-banking-copilot.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: chromadb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "retail-banking-copilot.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: chromadb
    spec:
      containers:
        - name: chromadb
          image: "{{ .Values.chromadb.image.repository }}:{{ .Values.chromadb.image.tag }}"
          imagePullPolicy: {{ .Values.chromadb.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: /chroma/chroma
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          volumeMounts:
            - name: chromadb-data
              mountPath: /chroma/chroma
          {{- with .Values.chromadb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: chromadb-data
          {{- if .Values.chromadb.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "retail-banking-copilot.chromadbFullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
