replicaCount: 1

image:
  repository: vinchar/retail-banking-copilot
  tag: 0.1.4
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  streamlitPort: 8501
  apiPort: 8080

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

persistence:
  data:
    enabled: true
    size: 2Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
  chroma:
    enabled: true
    size: 5Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

llm:
  baseUrl: https://qwen257b.project-public.serving.hpepcai3.demo.local
  model: Qwen/Qwen2.5-7B-Instruct
  apiKey: local
  existingSecret: ""
  existingSecretKey: LLM_API_KEY
  timeoutSeconds: 30

embedding:
  model: sentence-transformers/all-MiniLM-L6-v2
  baseUrl: https://all-mini-lm.project-public.serving.hpepcai3.demo.local
  apiKey: ""
  existingSecret: ""
  existingSecretKey: EMBEDDING_API_KEY

chroma:
  mode: http
  path: /app/chroma_db
  host: chroma-db.hpepcai3.demo.local
  port: 443
  ssl: true
  tenant: default_tenant
  database: default_database

env:
  logLevel: INFO
  allowLocalChromaFallback: "true"
  runtimeSettingsPath: /app/data/config/runtime_settings.json
  streamlitGatherUsageStats: "false"
  anonymizedTelemetry: "False"

ezua:
  virtualService:
    enabled: true
    endpoint: retail-banking-copilot.${DOMAIN_NAME}
    domain: ${DOMAIN_NAME}
    istioGateway: istio-system/ezaf-gateway
